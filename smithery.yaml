startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      relayUrl:
        type: string
        description: Toreva relay endpoint URL
      relayAuthToken:
        type: string
        description: Bearer token for relay authentication
    required:
      - relayUrl
      - relayAuthToken
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['packages/mcp/dist/index.js'],
      env: {
        RELAY_URL: config.relayUrl,
        RELAY_AUTH_TOKEN: config.relayAuthToken,
      }
    })
